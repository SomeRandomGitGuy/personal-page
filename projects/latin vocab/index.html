<html>
    <head>
        <link rel="stylesheet" type="text/css" href="style.css" />
        <title>latin vocab tester</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>latin vocab test</h1>
        <input type="file" onchange="readFile(this)">
        <p>give words from <input type="number" min="1" value="1" id="wordSelection"> to <input type="number" min="1" value="10" id="wordStart"></p>
        <p>translate <span id="word"></span></p>
        <input type="text" class="entry">
        <button onclick="submit()">SUBMIT</button>
        <p id="mark"></p>
        <br><br>
        <button onclick="loadNouns()">load nouns</button>
    </body>
    <script src="./data.js"></script>
    <script src="./script.js"></script>
</html>
